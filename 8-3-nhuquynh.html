<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quà 8/3 cho Như Quỳnh ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow-x:hidden;
}

h1{
color:white;
margin-top:30px;
font-size:40px;
}

.note{
color:white;
font-size:18px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:60px;
margin-top:50px;
}

.gift{
font-size:80px;
cursor:pointer;
animation:moveGift 3s infinite ease-in-out;
}

.gift:hover{
transform:scale(1.3);
}

@keyframes moveGift{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0px);
}

}

.card{
display:none;
width:260px;
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
margin-top:15px;
}

.card img{
width:100%;
border-radius:15px;
}

.card p{
font-size:18px;
color:#ff4d6d;
margin-top:10px;
}

.heart{
position:fixed;
bottom:0;
font-size:20px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-900px);
opacity:0;
}
}

.musicBtn{
position:fixed;
top:20px;
right:20px;
background:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>💝 Quà 8/3 dành cho Như Quỳnh 💝</h1>
<p class="note">Bấm vào từng hộp quà nhé 🎁</p>

<button class="musicBtn" onclick="toggleMusic()">🎵 Nhạc</button>

<audio id="music" loop>
<source src="nhac.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div>
<div class="gift" onclick="openCard(1)">🎁</div>
<div class="card" id="card1">
<img src="anh1.jpg">
<p>Chúc Như Quỳnh luôn xinh đẹp và rạng rỡ mỗi ngày 💖</p>
</div>
</div>

<div>
<div class="gift" onclick="openCard(2)">🎁</div>
<div class="card" id="card2">
<img src="anh2.jpg">
<p>Chúc em luôn vui vẻ và có thật nhiều tiếng cười 😊</p>
</div>
</div>

<div>
<div class="gift" onclick="openCard(3)">🎁</div>
<div class="card" id="card3">
<img src="anh3.jpg">
<p>Cảm ơn em vì đã xuất hiện trong cuộc đời anh ❤️</p>
</div>
</div>

<div>
<div class="gift" onclick="openCard(4)">🎁</div>
<div class="card" id="card4">
<img src="anh4.jpg">
<p>Chúc em một ngày 8/3 thật hạnh phúc. Anh thương em 💕</p>
</div>
</div>

</div>

<script>

function openCard(n){
document.getElementById("card"+n).style.display="block";
}

let music=document.getElementById("music");

function toggleMusic(){

if(music.paused){
music.play();
}
else{
music.pause();
}

}

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
